<style>
body {
  margin: 0;
  font-family: Arial;
  color: white;
  text-align: center;
  overflow: hidden;
}

.background {
  position: fixed;
  width: 100%;
  height: 100%;
  background: url('bg.jpg') no-repeat center center/cover;
  filter: brightness(0.45);
  z-index: -2;
}

.overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  z-index: -1;
  opacity: 0.06;
  font-size: 60px;
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  align-content: center;
}

.overlay span {
  margin: 25px;
  animation: float 6s infinite ease-in-out;
}

@keyframes float {
  0% { transform: translateY(0px); }
  50% { transform: translateY(-10px); }
  100% { transform: translateY(0px); }
}

.container {
  margin-top: 120px;
}

h1 {
  font-size: 50px;
  margin-bottom: 10px;
}

.btn {
  display: block;
  width: 260px;
  margin: 15px auto;
  padding: 15px;
  background: rgba(0,0,0,0.6);
  border: 2px solid white;
  border-radius: 12px;
  text-decoration: none;
  color: white;
  transition: 0.3s;
}

.btn:hover {
  background: white;
  color: black;
  transform: scale(1.05);
}
</style>
</head>
